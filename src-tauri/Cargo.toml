[package]
name = "ensemble"
version = "0.0.1"
description = "A terminal-of-terminals and agent orchestrator"
edition = "2021"

[lib]
name = "ensemble_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
