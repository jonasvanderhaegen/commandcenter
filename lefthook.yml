# Git hooks for CommandCenter. Installed automatically by `npm install`
# (the root `prepare` script runs `lefthook install`).
# Frontend formatting/linting via Vite+ (vp); Rust via cargo.
# public/ holds vendored libraries + static assets — never lint/format it.

# Refuse to run with an unexpectedly old binary, and fail loudly instead of
# silently skipping the hooks when lefthook is missing from a clone.
min_version: 2.1.9
assert_lefthook_installed: true

pre-commit:
  parallel: true
  skip:
    - merge
    - rebase
  jobs:
    - name: format
      # No `astro` here: vp fmt doesn't format .astro, and an all-.astro staged
      # set makes it error ("Expected at least one target file"). .astro is still
      # linted below.
      glob: "*.{js,ts,jsx,tsx,mjs,cjs,json,css,scss,md,html,yml,yaml}"
      exclude:
        - "ui/public/**"
      run: vp fmt {staged_files}
      stage_fixed: true
    - name: lint
      glob: "*.{js,ts,jsx,tsx,astro,mjs,cjs}"
      exclude:
        - "ui/public/**"
      run: vp lint {staged_files}
    - name: rustfmt
      glob: "src-tauri/**/*.rs"
      # --all covers both workspace members (commandcenter + crates/cc-mcp),
      # each formatted at its own edition (2021 and 2024).
      run: cargo fmt --all --manifest-path src-tauri/Cargo.toml -- --check

pre-push:
  jobs:
    - name: check
      run: vp check
    # Rust clippy is intentionally CI-only: `cargo clippy --workspace` compiles
    # the whole Tauri dependency tree, too heavy for the local 8GB box (which has
    # no sccache/R2 cache). CI runs it with sccache; `rustfmt` still gates Rust
    # formatting at pre-commit.
