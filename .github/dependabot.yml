version: 2
updates:
  # Rust crate dependencies (Tauri backend lives in src-tauri/)
  - package-ecosystem: "cargo"
    directory: "/src-tauri"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      cargo:
        patterns:
          - "*"
  # Frontend npm dependencies (Astro app lives in ui/)
  - package-ecosystem: "npm"
    directory: "/ui"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      npm:
        patterns:
          - "*"
  # GitHub Actions: keeps the pinned action SHAs current and patched
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      actions:
        patterns:
          - "*"
